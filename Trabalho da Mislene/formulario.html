<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <h2>Formularios</h2>

    <form>
        <div>
           <label for="name">Nome:
            <input type="text">
           </label> 
        </div>
        <br>
            
        <div>
           <label for="idade">Idade:
            <input type="number" min="0" max="200">
           </label> 
        </div>
        <br>
       
        <div>
           <label for="cidade">Cidade:
            <input type="text">
           </label> 
        </div>
        <br>
       
        <div>
           <label for="uf">UF:
            <input type="text">
           </label> 
        </div>
        <br>
       
        <div>
           <label for="endereco">Endereço:
            <input type="text">
           </label> 
        </div>
        <br>

        <div>
           <label for="bairro">Bairro:
            <input type="text">
           </label> 
        </div>
        <br>

        <div>
           <label for="number">Número da Casa (AP):
             <input type="number">
           </label>
        </div>
        <br>

        <div>
           <label for="Email">Email:
            <input type="Email" required>
           </label>
        </div>
        <br>

        <div>
           <label for="senha">Senha: 
            <input type="password">
           </label>
        </div>
        <br>

        <div>
           <label for="telefone">Telefone:
            <input type="tel" required placeholder="(XX)XXXXX-XXXX">   
           </label>
        </div>
        <br>

        <div>
        <fieldset>
            <legend>Sexo</legend>
            <p>
                <label>
                    <input type="radio" name="sexo" value="Masculino"> Masculino:
                </label>
            </p>
            <p>
                <label>
                    <input type="radio" name="sexo" value="Feminino"> Feminino:
                </label>
            </p>
            <p>
                <label>
                    <input type="radio" name="sexo" value="naomencionar"> Não Mencionar:
                </label>
            </p>
        </fieldset>

</form>
</body>
</html>
