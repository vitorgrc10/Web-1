<!DOCTYPE html>
<html>

<head>
    <title>Formularios</title>
</head>

<body>
    <ul>
        <li>
            <a href="index.html">Home</a>
        </li>

        <li>
            <a href="lista.html">Listas</a>
        </li>

        <li>
            <a href="table.html">Tabelas</a>
        </li>

        <li>
            <a href="img.html">Imagens</a>
        </li>
    </ul>

    <h2>Formularios</h2>

    <form>
        <div>
            <label for="name">Nome: 
            <input type="text">
            </label>
        </div>

        <br>
        <div>
            <label for="idade">Idade: 
            <input type="number" min="0" max="200">
            </label>
            <div>
                <br>

                <div>
                    <label for="Usuario">Usuario: 
                    <input type="text">
                    </label>
                </div>
                <br>

                <div>
                    <label for="senha">Senha: 
                    <input type="password">
                    </label>
                </div>
                <br>

    </form>
    <div>
        <label for="dataEvento">Data do Evento: 
        <input type="date">
        </label>
    </div>
    <br>

    <div>
        <label for="">
            Telefone:
            <input type="tel" required placeholder="(XX)XXXXX-XXXX">
        </label>
    </div>
    <br>

    <div>
        <label for="Email">Email
            <input type="Email" required>
        </label>
    </div>
    <br>

    <div>
        <label for="peso">Peso:
            <input type="number" min="0" max="200" step="0.5">
        </label>
    </div>
    <br>

    <div>
        <label for="volume">
            <input type="range" min="0" max="100" step="10">
        </label>
    </div>
    <br>

    <div>
        <fieldset>
            <legend>Estado Civil</legend>
            <p>
                <label>
                    <input type="radio" name="est_civil" value="casado"> Casado:
                </label>
            </p>
            <p>
                <label>
                    <input type="radio" name="est_civil" value="solteiro"> Solteiro:
                </label>
            </p>
            <p>
                <label>
                    <input type="radio" name="est_civil" value="divorciado"> Divorciado:
                </label>
            </p>
        </fieldset>

        <fieldset>
            <legend>Produtos</legend>
            <P>
                <label>
                    <input type="checkbox" name="computador" value="computador"> Computador
                    <br>
                    <input type="checkbox" name="monitor" value="monitor"> Monitor
                    <br>
                    <input type="checkbox" name="mouse" value="mouse"> Mouse
                    <br>
                    <input type="checkbox" name="teclado" value="teclado"> Teclado
                    <br>
                    <input type="checkbox" name="mouse pad" value="mouse pad"> Mouse Pad
                </label>
            </P>
        </fieldset>
    </div>
    <br>

    <div>
        <label>
            Deixe sua sugestão:
            <textarea cols="30" rows="5"></textarea>
        </label>
    </div>

    <p>
            <label for="">
                Site: <input type="url" list="sites" name="link">
            </label>
        </p>
        <datalist id="sites">
            <option label="Youtube" value="https://www.youtube.com/"></option>
            <option label="DIscord" value="https://discord.com/"></option>
            <option label="Instagram" value="https://www.instagram.com/"></option>
        </datalist>

    <div>
        <p>
            <label >
                carro:
                <select name="carros" required>
                    <optgroup label="1 Esportivos">
                    <option value="1.1">Ferrari</option>
                    <option value="1.2">Porsche</option>
                    <option value="1.3">Lamborghini</option>
                    <option value="1.4">Koenigsegg</option>
                    
                    <optgroup label="2 Popular">
                    <option value="2.1">Hb20</option>
                    <option value="2.2">I30</option>
                    <option value="2.3">Nivus</option>
                    <option value="2.4">Golf GTI</option>

                </select>
            </label>
        </p>
    </div>
        
    <div>
        <form action="https://www.unipam.edu.br/">
            <button type="submit" style="color: blue;">Enviar</button>
            <br>
        </form>
    </div>

</body>

</html>
